version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: health_ai_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: health_ai
      MYSQL_USER: health_user
      MYSQL_PASSWORD: health_password
    ports:
      - "3306:3306"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_ai_backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=health_user
      - DB_PASSWORD=health_password
      - DB_NAME=health_ai
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: health_ai_engine
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health_ai_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
